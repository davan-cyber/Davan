<!DOCTYPE html>
<html>
<head>
  <title>Drive Manual Viewer</title>
</head>
<body>

<h2>📘 My Lab Manuals</h2>

<select onchange="openFile(this.value)">
  <option value="">Select Manual</option>
  <option value="https://drive.google.com/file/d/1y1cj22Pmy--NeV176JrBTBFWE3MXQP9u/preview">PhP Lab</option>
  <option value="https://drive.google.com/file/d/1KkZe59P13Qzq99D6bfvhlTfcZVaP97-C/preview">AI Lab</option>
</select>

<br><br>

<iframe id="viewer" width="100%" height="500px"></iframe>

<script>
function openFile(link) {
  document.getElementById("viewer").src = link;
}
</script>

</body>
</html>
